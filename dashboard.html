<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
    <title>kubenu</title>
  </head>
  <body>
    <div class="sidenav">
        <div class="sidenav-bar">
          <div class="sidenav-icon" data-target="home">
            <i class="fas fa-home"></i>
          </div>
          <div class="sidenav-icon" data-target="about">
            <i class="fas fa-info-circle"></i>
          </div>
          <div class="sidenav-icon" data-target="services">
            <i class="fas fa-cogs"></i>
          </div>
          <div class="sidenav-icon" data-target="contact">
            <i class="fas fa-envelope"></i>
          </div>
        </div>
        <div class="sidenav-content">
          <div id="home" class="section-content">
            <h2>Home</h2>
            <p>Welcome to the home section.</p>
          </div>
          <div id="about" class="section-content">
            <h2>About</h2>
            <p>Learn more about us.</p>
          </div>
          <div id="services" class="section-content">
            <h2>Services</h2>
            <p>Explore our services.</p>
          </div>
          <div id="contact" class="section-content">
            <h2>Contact</h2>
            <p>Contact us for inquiries.</p>
          </div>
        </div>
      </div>
            <script>
// JavaScript to handle hover effect
var sidenav = document.querySelector('.sidenav');
var sidenavIcons = document.querySelectorAll('.sidenav-icon');
var sidenavContent = document.querySelector('.sidenav-content');

sidenav.addEventListener('mouseenter', function() {
  sidenav.classList.add('expanded');
});

sidenav.addEventListener('mouseleave', function() {
  sidenav.classList.remove('expanded');
  sidenavContent.querySelectorAll('.section-content').forEach(function(section) {
    section.classList.remove('active');
  });
});

sidenavIcons.forEach(function(icon) {
  icon.addEventListener('mouseenter', function() {
    var target = this.getAttribute('data-target');
    var activeSection = document.getElementById(target);

    sidenavContent.querySelectorAll('.section-content').forEach(function(section) {
      section.classList.remove('active');
    });
    activeSection.classList.add('active');
  });
});
      </script>
  </body>
</html>
